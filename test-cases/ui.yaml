# UI 模块测试用例
# 覆盖启动页、HUD、结束页
#
# 模块版本: v1.1
# 最后更新: 2026-04-25

test_cases:
  - id: TC-UI-001
    title: 启动界面显示
    version: 1.0
    priority: P0
    module: ui
    tags: [smoke, ui, overlay]
    created_at: 2026-04-22
    updated_at: 2026-04-22
    status: active
    history:
      - version: 1.0
        date: 2026-04-22
        author: Claude
        change: 初始创建
    preconditions:
      - 打开 index.html
    steps:
      - action: 加载页面
        expected: 页面正常渲染
      - action: 不点击开始按钮
        expected: overlay 保持显示状态
    expected_results:
      - overlay 元素可见，不包含 is-hidden 类
      - 标题文本为 "准备起飞"
      - 按钮文案为 "开始游戏"
      - HUD 显示 score=0, health=3, level=1
    assertions:
      - type: dom
        selector: "#overlay"
        condition: not.hasClass('is-hidden')
      - type: dom
        selector: "#overlayTitle"
        condition: text == "准备起飞"
      - type: dom
        selector: "#startButton"
        condition: text == "开始游戏"
      - type: dom
        selector: "#score"
        condition: text == "0"
      - type: dom
        selector: "#health"
        condition: text == "3"
      - type: dom
        selector: "#level"
        condition: text == "1"

  - id: TC-UI-002
    title: HUD 实时更新
    version: 1.1
    priority: P0
    module: ui
    tags: [functional, hud, regression]
    created_at: 2026-04-22
    updated_at: 2026-04-25
    status: active
    history:
      - version: 1.0
        date: 2026-04-22
        author: Claude
        change: 初始创建
      - version: 1.1
        date: 2026-04-25
        author: Claude
        change: 新增道具得分显示验证（v1.1 道具系统）
    preconditions:
      - 游戏已开始
      - 玩家存活
    steps:
      - action: 击毁至少 1 个普通敌机
        expected: 敌机被击毁，得分增加
      - action: 发生至少 1 次玩家受击
        expected: 生命减少，玩家闪烁
      - action: 等待 Boss 出现（约 16 秒）
        expected: Boss 出现，阶段升级
    expected_results:
      - 击毁普通敌机后得分增加 5
      - 受击后生命减少 1
      - Boss 出现时阶段值从 1 变为 2
    assertions:
      - type: state
        description: HUD 文本变化与游戏行为一一对应
        evidence: [screenshot, hud_values]

  - id: TC-UI-003
    title: 结束界面显示
    version: 1.0
    priority: P0
    module: ui
    tags: [functional, game-over, regression]
    created_at: 2026-04-22
    updated_at: 2026-04-22
    status: active
    history:
      - version: 1.0
        date: 2026-04-22
        author: Claude
        change: 初始创建
    preconditions:
      - 玩家生命为 1
      - 可被再次撞击
    steps:
      - action: 让玩家再次被敌机撞击
        expected: 玩家生命归零，游戏结束
    expected_results:
      - state.running = false
      - overlay 显示，标题为 "任务失败"
      - 按钮文案切换为 "重新开始"
      - 文案中包含最终得分和阶段
    assertions:
      - type: dom
        selector: "#overlay"
        condition: not.hasClass('is-hidden')
      - type: dom
        selector: "#overlayTitle"
        condition: text == "任务失败"
      - type: dom
        selector: "#startButton"
        condition: text == "重新开始"
      - type: dom
        selector: "#overlayText"
        condition: text contains "得分" and "阶段"

