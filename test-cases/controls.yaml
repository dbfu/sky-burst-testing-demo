  - id: TC-CTRL-005
    title: WASD 等价控制
    priority: P0
    module: controls
    tags: [keyboard, movement, regression]
    preconditions:
      - 游戏运行中
      - 玩家位于画布中心区域
    steps:
      - action: 分别测试 A/D/W/S 键
        input:
          - key: A
            expected_direction: left
          - key: D
            expected_direction: right
          - key: W
            expected_direction: up
          - key: S
            expected_direction: down
        note: 与对应方向键执行相同按压时长
    expected_results:
      - A 键产生与 ArrowLeft 相同的移动效果
      - D 键产生与 ArrowRight 相同的移动效果
      - W 键产生与 ArrowUp 相同的移动效果
      - S 键产生与 ArrowDown 相同的移动效果
    assertions:
      - type: state
        description: WASD 与方向键等价

  - id: TC-CTRL-006
    title: 组合方向移动
    priority: P1
    module: controls
    tags: [keyboard, movement]
    preconditions:
      - 游戏运行中
      - 玩家位于画布中心附近
    steps:
      - action: 同时按住 ArrowLeft + ArrowUp 800ms
        input:
          keys: [ArrowLeft, ArrowUp]
          duration: 800ms
      - action: 松开所有按键
    expected_results:
      - x 坐标减小
      - y 坐标减小
      - 出现斜向位移，而不是只响应一个方向
    assertions:
      - type: state
        description: x_after < x_before AND y_after < y_before
        evidence: [player_position_log]

  - id: TC-CTRL-007
    title: 移动边界限制
    priority: P0
    module: controls
    tags: [boundary, movement, regression]
    preconditions:
      - 游戏运行中
    steps:
      - action: 长按 ArrowLeft 直到贴边
        expected: 玩家停止在左边界
      - action: 长按 ArrowRight 直到贴边
        expected: 玩家停止在右边界
      - action: 长按 ArrowUp 直到贴边
        expected: 玩家停止在上边界
      - action: 长按 ArrowDown 直到贴边
        expected: 玩家停止在下边界
    expected_results:
      - 玩家不会越界
      - X 始终位于 [28, canvas.width - 28]
      - Y 始终位于 [36, canvas.height - 36]
    assertions:
      - type: state
        description: 边界值稳定，不出现超边或抖动穿透
        validate:
          - player.x >= 28
          - player.x <= canvas.width - 28
          - player.y >= 36
          - player.y <= canvas.height - 36
        evidence: [screenshot, position_log]

  - id: TC-CTRL-008
    title: 未开始时键盘无效
    priority: P1
    module: controls
    tags: [keyboard, state]
    preconditions:
      - 页面初始状态
      - 未点击开始按钮
    steps:
      - action: 按住任意方向键 500ms
        input:
          key: ArrowLeft (或其他任意方向)
          duration: 500ms
    expected_results:
      - 玩家位置不发生变化
      - 游戏不进入运行态
    assertions:
      - type: dom
        selector: "#overlay"
        condition: not.hasClass('is-hidden')
      - type: state
        description: HUD 数值不变化
        validate:
          - score == 0
          - health == 3
          - level == 1