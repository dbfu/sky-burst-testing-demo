# TC-UI-003 结束界面显示
# UI 模块 - 测试用例

id: TC-UI-003
title: 结束界面显示
version: 1.0
priority: P0
module: ui
tags: [functional, game-over, regression]

created_at: 2026-04-22
updated_at: 2026-04-22
status: active

history:
  - version: 1.0
    date: 2026-04-22
    author: Claude
    change: 初始创建

preconditions:
  - 玩家生命为 1
  - 可被再次撞击

steps:
  - action: 让玩家再次被敌机撞击
    expected: 玩家生命归零，游戏结束

expected_results:
  - state.running = false
  - overlay 显示，标题为 "任务失败"
  - 按钮文案切换为 "重新开始"
  - 文案中包含最终得分和阶段

assertions:
  - type: dom
    selector: "#overlay"
    condition: not.hasClass('is-hidden')
  - type: dom
    selector: "#overlayTitle"
    condition: text == "任务失败"
  - type: dom
    selector: "#startButton"
    condition: text == "重新开始"
  - type: dom
    selector: "#overlayText"
    condition: text contains "得分" and "阶段"