# Sky Burst 测试用例索引
# 按模块分组，每个用例独立目录

project:
  name: Sky Burst
  type: Canvas 纵版飞行射击游戏
  version: v1.1
  repository: https://github.com/dbfu/sky-burst-testing-demo

modules:
  - id: controls
    name: 键盘控制模块
    directory: controls/
    cases:
      - TC-CTRL-001
      - TC-CTRL-002
      - TC-CTRL-003
      - TC-CTRL-004
      - TC-CTRL-005
      - TC-CTRL-006
      - TC-CTRL-007
      - TC-CTRL-008
    count: 8

  - id: ui
    name: UI 模块
    directory: ui/
    cases:
      - TC-UI-001
      - TC-UI-002
      - TC-UI-003
    count: 3

  - id: items
    name: 道具系统模块
    directory: items/
    cases:
      - TC-ITEM-001
    count: 1

structure:
  pattern: "{module}/{case-id}/"
  contents:
    - "{case-id}.yaml"    # 用例定义
    - "index.md"          # 执行历史汇总
    - "{execution}/"      # 执行报告目录

quick_links:
  - TC-CTRL-007: controls/TC-CTRL-007/
  - TC-UI-001: ui/TC-UI-001/
  - TC-ITEM-001: items/TC-ITEM-001/

workflow_docs:
  - ISSUE_WORKFLOW.md
  - REGRESSION_WORKFLOW.md
  - TESTER_RESPONSIBILITIES.md