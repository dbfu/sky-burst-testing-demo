# Sky Burst 测试用例索引
# 所有用例文件位于 cases/ 目录下，按模块分组

project:
  name: Sky Burst
  type: Canvas 纵版飞行射击游戏
  version: v1.1
  repository: https://github.com/dbfu/sky-burst-testing-demo

modules:
  - id: ui
    name: UI 模块
    directory: cases/ui/
    cases:
      - TC-UI-001.yaml
      - TC-UI-002.yaml
      - TC-UI-003.yaml
    count: 3

  - id: controls
    name: 键盘控制模块
    directory: cases/controls/
    cases:
      - TC-CTRL-001.yaml
      - TC-CTRL-002.yaml
      - TC-CTRL-003.yaml
      - TC-CTRL-004.yaml
      - TC-CTRL-005.yaml
      - TC-CTRL-006.yaml
      - TC-CTRL-007.yaml
      - TC-CTRL-008.yaml
    count: 8

  - id: mobile
    name: 移动端控制模块
    directory: cases/mobile/
    cases: []
    count: 5

  - id: mechanics
    name: 游戏机制模块
    directory: cases/mechanics/
    cases: []
    count: 8

  - id: state
    name: 状态流转模块
    directory: cases/state/
    cases: []
    count: 3

  - id: render
    name: 渲染与性能模块
    directory: cases/render/
    cases: []
    count: 5

  - id: items
    name: 道具系统模块
    directory: cases/items/
    cases: []
    count: 5

summary:
  total_cases: 32
  by_priority:
    P0: 18
    P1: 12
    P2: 2

environment:
  os: macOS
  browser: Chromium
  viewports:
    - name: desktop
      width: 1200
      height: 900
      default: true
    - name: mobile
      width: 600
      height: 800

known_issues:
  - id: BUG-001
    description: 启动提示提到"空格冲刺"但未实现
    status: fixed
    fix: 删除错误提示文案