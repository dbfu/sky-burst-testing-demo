# TC-CTRL-008 未开始时键盘无效
# 键盘控制模块 - 测试用例

id: TC-CTRL-008
title: 未开始时键盘无效
version: 1.0
priority: P1
module: controls
tags: [keyboard, state]

created_at: 2026-04-22
updated_at: 2026-04-22
status: active

history:
  - version: 1.0
    date: 2026-04-22
    author: Claude
    change: 初始创建

preconditions:
  - 页面初始状态
  - 未点击开始按钮

steps:
  - action: 按住任意方向键 500ms
    input:
      key: ArrowLeft (或其他任意方向)
      duration: 500ms

expected_results:
  - 玩家位置不发生变化
  - 游戏不进入运行态

assertions:
  - type: dom
    selector: "#overlay"
    condition: not.hasClass('is-hidden')
  - type: state
    description: HUD 数值不变化
    validate:
      - score == 0
      - health == 3
      - level == 1