# 渲染与性能模块测试用例
# 覆盖背景、角色渲染、粒子、性能

test_cases:
  - id: TC-RENDER-001
    title: 背景与星空渲染
    priority: P1
    module: render
    tags: [render, visual]
    preconditions:
      - 游戏运行中
    steps:
      - action: 观察背景和星星运动
        expected: 背景渐变，星星下落
    expected_results:
      - 画布背景为纵向渐变（#0f2234 → #112433 → #10261a）
      - 星星持续向下移动并循环出现
      - 星空数量稳定（约 80 颗）
      - 无明显闪烁中断
    assertions:
      - type: visual
        description: 背景渐变正确，星星运动流畅
        allow_manual_observation: true
        evidence: [screenshot, video]

  - id: TC-RENDER-002
    title: 玩家、敌机、Boss 可辨识
    priority: P1
    module: render
    tags: [render, visual]
    preconditions:
      - 对象已出现在画布内
    steps:
      - action: 分别观察玩家、普通敌机、Boss
        expected: 三类对象可区分
    expected_results:
      - 玩家为绿色（#8df3c1）菱形飞船
      - 普通敌机为粉红色（#ff8674）三角形
      - Boss 为金色（#ffe27a）大型矩形，附带血条
      - 玩家受击时外观变为浅粉色（#ffb19f）
    assertions:
      - type: visual
        description: 三类对象形状和颜色可区分
        allow_manual_observation: true
        evidence: [screenshot]

  - id: TC-RENDER-003
    title: 粒子生命周期
    priority: P1
    module: render
    tags: [render, particles]
    preconditions:
      - 发生命中或击毁
    steps:
      - action: 观察粒子产生到消失
        expected: 粒子扩散后消失
    expected_results:
      - 粒子从碰撞点扩散
      - 粒子逐渐消失（透明度降低）
      - 粒子不会永久残留
    assertions:
      - type: state
        description: 粒子数量在短时间内回落
        validate:
          - particles created on collision
          - particles removed when life <= 0
        evidence: [particle_count_log]

  - id: TC-PERF-001
    title: 60 秒基础流畅性
    priority: P1
    module: render
    tags: [performance, stability]
    preconditions:
      - 游戏运行中
    steps:
      - action: 连续运行 60 秒
        note: 包含移动、击毁和 Boss 出现
    expected_results:
      - 无明显卡死现象
      - 无脚本报错
      - 无持续掉帧现象
      - requestAnimationFrame 持续执行
      - 交互不中断
    assertions:
      - type: performance
        description: 游戏运行稳定
        validate:
          - no console errors
          - frame rate stable (target: 60fps)
          - animation continues
        evidence: [console_log, fps_log, video]

  - id: TC-PERF-002
    title: 高阶段对象堆积观察
    priority: P2
    module: render
    tags: [performance, stress]
    preconditions:
      - 进入高阶段（level >= 3）
    steps:
      - action: 持续运行并观察画面对象数量和交互响应
        note: 本用例为观察性性能用例
    expected_results:
      - 即使对象增多，游戏仍可操作
      - 若出现性能下降，应记录实际阶段、对象数量和症状
    assertions:
      - type: performance
        description: 本用例是观察性性能用例，不声明"敌机数量有硬上限"
        allow_manual_observation: true
        metrics_to_record:
          - current level
          - enemy count
          - bullet count
          - particle count
          - observed frame rate
          - any lag symptoms
        evidence: [performance_log, video]