# TC-CTRL-007 移动边界限制
# 键盘控制模块 - 测试用例
#
# 关联 Issue: #1 (https://github.com/dbfu/sky-burst-testing-demo/issues/1)

id: TC-CTRL-007
title: 移动边界限制
version: 1.1
priority: P0
module: controls
tags: [boundary, movement, regression]

created_at: 2026-04-22
updated_at: 2026-04-22
status: active

history:
  - version: 1.0
    date: 2026-04-22
    author: Claude
    change: 初始创建，边界值设定为 28
  - version: 1.1
    date: 2026-04-22
    author: Claude
    change: BUG-002 修复后，边界值调整为 25，关联 Issue #1

related_issue: https://github.com/dbfu/sky-burst-testing-demo/issues/1

preconditions:
  - 游戏运行中

steps:
  - action: 长按 ArrowLeft 直到贴边
    expected: 玩家停止在左边界
  - action: 长按 ArrowRight 直到贴边
    expected: 玩家停止在右边界
  - action: 长按 ArrowUp 直到贴边
    expected: 玩家停止在上边界
  - action: 长按 ArrowDown 直到贴边
    expected: 玩家停止在下边界

expected_results:
  - 玩家不会越界
  - X 始终位于 [25, canvas.width - 25]
  - Y 始终位于 [36, canvas.height - 36]

assertions:
  - type: state
    description: 边界值稳定，不出现超边或抖动穿透
    validate:
      - player.x >= 25
      - player.x <= canvas.width - 25
      - player.y >= 36
      - player.y <= canvas.height - 36
    evidence: [screenshot, position_log]