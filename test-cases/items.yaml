# 道具系统模块测试用例
# 覆盖道具生成、拾取、效果、持续时间
#
# 模块版本: v1.0
# 创建日期: 2026-04-25
# 对应游戏版本: v1.1

test_cases:
  - id: TC-ITEM-001
    title: 护盾道具生成
    version: 1.0
    priority: P0
    module: items
    tags: [item, shield, spawn, new-feature]
    game_version: v1.1
    created_at: 2026-04-25
    updated_at: 2026-04-25
    status: active
    history:
      - version: 1.0
        date: 2026-04-25
        author: Claude
        change: 随 v1.1 道具系统上线创建
    preconditions:
      - 游戏运行中
      - 阶段 >= 2
    steps:
      - action: 等待道具随机生成
        expected: 护盾道具从顶部进入
    expected_results:
      - 护盾道具随机生成
      - 道具外观为蓝色圆形图标
      - 道具缓慢下落
    assertions:
      - type: state
        description: 护盾道具生成于顶部，y < 0 初始
        validate:
          - item.type == "shield"
          - item.y < 0 at spawn
        evidence: [item_spawn_log]

  - id: TC-ITEM-002
    title: 护盾道具拾取
    priority: P0
    module: items
    tags: [item, shield, pickup, new-feature]
    version_added: v1.1
    preconditions:
      - 游戏运行中
      - 护盾道具在场
      - 玩家未处于无敌状态
    steps:
      - action: 移动玩家接触护盾道具
        expected: 道具被拾取
    expected_results:
      - 道具消失
      - 玩家获得护盾状态
      - 玩家外观变化（蓝色光环）
      - 拾取音效播放
    assertions:
      - type: state
        description: 玩家获得护盾，道具消失
        validate:
          - player.hasShield == true
          - item.dead == true
          - player.shieldDuration == 5.0
        evidence: [player_state_log, screenshot]

  - id: TC-ITEM-003
    title: 护盾效果持续时间
    priority: P0
    module: items
    tags: [item, shield, duration, new-feature]
    version_added: v1.1
    preconditions:
      - 玩家已获得护盾
    steps:
      - action: 等待 5 秒
        expected: 护盾自然消失
      - action: 在护盾期间被敌机撞击
        expected: 不扣血
    expected_results:
      - 护盾持续 5 秒后消失
      - 护盾期间碰撞不扣血
      - 护盾被撞击后消耗并消失
    assertions:
      - type: state
        description: 护盾持续 5 秒，期间无敌
        validate:
          - shield duration == 5.0s
          - collision with shield: health unchanged
        evidence: [shield_timer_log]

  - id: TC-ITEM-004
    title: 加速道具效果
    priority: P1
    module: items
    tags: [item, boost, new-feature]
    version_added: v1.1
    preconditions:
      - 游戏运行中
      - 加速道具在场
    steps:
      - action: 移动玩家接触加速道具
        expected: 道具被拾取
      - action: 按住方向键移动
        expected: 移动速度提升
    expected_results:
      - 玩家移动速度提升 50%
      - 加速持续 3 秒
      - 外观变化（绿色尾焰）
    assertions:
      - type: state
        description: 玩家速度提升 50%
        validate:
          - player.speed == 480 (base 320 * 1.5)
          - boost duration == 3.0s
        evidence: [player_speed_log]

  - id: TC-ITEM-005
    title: 道具与Boss同时在场
    priority: P1
    module: items
    tags: [item, boss, new-feature]
    version_added: v1.1
    preconditions:
      - Boss 已出现
      - 道具生成系统启用
    steps:
      - action: 在 Boss 战期间等待道具生成
        expected: 道具正常生成
    expected_results:
      - Boss 战期间道具仍可生成
      - 道具与 Boss 不冲突
      - 拾取道具可辅助击杀 Boss
    assertions:
      - type: state
        description: Boss 战期间道具系统正常运作
        evidence: [game_state_log, video]