# 状态流转模块测试用例
# 覆盖游戏启动、结束、重开

test_cases:
  - id: TC-STATE-001
    title: 点击开始
    priority: P0
    module: state
    tags: [state, start, regression]
    preconditions:
      - 页面已加载
      - overlay 可见
    steps:
      - action: 点击 "开始游戏" 按钮
        input:
          selector: "#startButton"
          action: click
    expected_results:
      - overlay 隐藏
      - 玩家、敌机、子弹、粒子、计分进入初始运行状态
      - HUD 重置到 0 / 3 / 1
    assertions:
      - type: dom
        selector: "#overlay"
        condition: hasClass('is-hidden')
      - type: state
        description: state 初始化
        validate:
          - state.running == true
          - state.gameOver == false
          - state.score == 0
          - state.level == 1
          - state.player.health == 3
          - state.bullets.length == 0
          - state.enemies.length == 0
          - state.particles.length == 0
        evidence: [state_snapshot]

  - id: TC-STATE-002
    title: 游戏结束后停止推进
    priority: P0
    module: state
    tags: [state, game-over, regression]
    preconditions:
      - 玩家生命为 1
      - 可被再次撞击
    steps:
      - action: 触发最后一次受击
        expected: 玩家死亡，游戏结束
      - action: 继续观察 2 秒
        expected: 无新对象生成
    expected_results:
      - 游戏结束后不再继续推进逻辑
      - 不再新增子弹
      - 不再新增敌机
      - overlay 显示失败界面
    assertions:
      - type: state
        description: running=false 后对象数量不再增长
        validate:
          - state.running == false
          - state.gameOver == true
          - bullets count stable after game over
          - enemies count stable after game over
        evidence: [state_log, object_count_log]

  - id: TC-STATE-003
    title: 重新开始完全重置
    priority: P0
    module: state
    tags: [state, restart, regression]
    preconditions:
      - 游戏已结束
      - 场景中存在旧敌机、旧子弹或粒子
    steps:
      - action: 点击 "重新开始" 按钮
        input:
          selector: "#startButton"
          action: click
    expected_results:
      - 分数、生命、阶段、计时器、按键状态全部重置
      - 旧敌机、旧子弹、旧粒子被清空
      - overlay 再次隐藏
      - 游戏进入新的运行态
    assertions:
      - type: state
        description: 不应继承上一局残留状态
        validate:
          - state.score == 0
          - state.level == 1
          - state.player.health == 3
          - state.bullets.length == 0
          - state.enemies.length == 0
          - state.particles.length == 0
          - state.spawnTimer == 0
          - state.bossTimer == 0
          - keys.left == false
          - keys.right == false
          - keys.up == false
          - keys.down == false
          - state.running == true
          - state.gameOver == false
        evidence: [state_snapshot]